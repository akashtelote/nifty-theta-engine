version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  upstox_wheel_bot:
    build:
      context: .
      dockerfile: Dockerfile
    # Tag the build so the dashboard can reuse it instantly
    image: upstox_wheel_base:latest
    container_name: upstox_wheel_bot
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_URL=redis://host.docker.internal:6379/0
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "main.py", "start"]

  dashboard:
    # Do not build again. Use the image compiled by the bot service.
    image: upstox_wheel_base:latest
    container_name: upstox_pnl_dashboard
    restart: always
    ports:
      - "8502:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      # Ensure the bot service starts (and builds the image) before the dashboard tries to pull it
      upstox_wheel_bot:
        condition: service_started
    command: ["uv", "run", "streamlit", "run", "dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]

volumes:
  postgres_data: