version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  upstox_wheel_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upstox_wheel_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "main.py", "start"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upstox_pnl_dashboard
    restart: always
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # Added depends_on to ensure database exists before dashboard spins up
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "streamlit", "run", "dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]

volumes:
  postgres_data: